services:
  - type: web
    name: ai-presentation-builder-api
    runtime: python
    rootDir: backend
    buildCommand: PIP_PREFER_BINARY=1 CARGO_HOME=/tmp/cargo pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # Bạn nhập tay trong Render Dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # Fix maturin/Rust build lỗi "Read-only file system"
      - key: PIP_PREFER_BINARY
        value: "1"
      - key: CARGO_HOME
        value: /tmp/cargo
      # Uncomment nếu dùng Claude thay vì Gemini:
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      # - key: LLM_PROVIDER
      #   value: anthropic
